<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1e293b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Daily Job Report</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    
    <!-- jsPDF Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- html2canvas (sometimes needed for jspdf auto image processing) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <header class="app-header">
        <h1 id="header-title">Job Reports</h1>
        <button id="btn-back" class="icon-btn hidden" aria-label="Back">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
    </header>

    <main id="app-container">
        <!-- View: Dashboard (List of Reports / Start New) -->
        <section id="view-dashboard" class="view active">
            <div class="empty-state">
                <div class="empty-icon">📝</div>
                <h2>Ready to Start</h2>
                <p>Create a new daily job report to document your progress.</p>
            </div>
            
            <div id="reports-list" class="reports-grid"></div>
            
            <button id="btn-new-report" class="fab-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                <span>New Report</span>
            </button>
        </section>

        <!-- View: New Report Form -->
        <section id="view-form" class="view hidden">
            <form id="report-form">
                
                <div class="card form-section">
                    <h3>Project Details</h3>
                    
                    <div class="form-group">
                        <label for="project-name">Project Name</label>
                        <input type="text" id="project-name" required placeholder="e.g. Downtown Revitalization">
                    </div>
                    
                    <div class="form-group">
                        <label for="client-name">Client Name</label>
                        <input type="text" id="client-name" required placeholder="e.g. Acme Corp">
                    </div>
                    
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" required>
                    </div>

                    <div class="form-group">
                        <label>Location</label>
                        <div class="location-group">
                            <input type="text" id="address" placeholder="Address">
                            <input type="text" id="gps-coords" placeholder="GPS Coordinates" readonly>
                            <button type="button" id="btn-get-location" class="btn-secondary">📍 Get GPS</button>
                        </div>
                    </div>
                </div>

                <div class="card form-section">
                    <h3>Job Information</h3>
                    
                    <div class="form-group">
                        <label for="issues">Issues / Roadblocks</label>
                        <textarea id="issues" rows="3" placeholder="Describe any issues encountered today..."></textarea>
                    </div>
                    


                    <div class="form-group">
                        <label for="notes">General Notes</label>
                        <textarea id="notes" rows="4" placeholder="Summary of work completed..."></textarea>
                    </div>
                </div>

                <div class="card form-section">
                    <div class="section-header">
                        <h3>Photos</h3>
                        <span class="photo-counter"><span id="photo-count">0</span>/24</span>
                    </div>
                    <p class="helper-text">Add photos and provide details for each. Max 6 per PDF page.</p>
                    
                    <div id="photo-list" class="photo-grid">
                        <!-- Uploaded photos will appear here -->
                    </div>

                    <label class="btn-outline upload-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                        Add Photo
                        <input type="file" id="photo-input" accept="image/*" multiple hidden>
                    </label>
                </div>

                <div class="action-bar">
                    <button type="button" id="btn-save-draft" class="btn-outline">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                        Save Draft
                    </button>
                    <button type="submit" id="btn-save" class="btn-primary">Save & Submit</button>
                    <button type="button" id="btn-generate-pdf" class="btn-secondary">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                        Generate PDF
                    </button>
                </div>

            </form>
        </section>
        
        <!-- Loading Overlay -->
        <div id="loading-overlay" class="hidden">
            <div class="spinner"></div>
            <p id="loading-text">Processing...</p>
        </div>

    </main>

    <!-- Template for a photo item -->
    <template id="photo-item-template">
        <div class="photo-item">
            <button type="button" class="btn-remove-photo">&times;</button>
            <img src="" alt="Job photo" class="preview-img">
            <select class="photo-grading" style="border: none; border-top: 1px solid var(--border); border-radius: 0; padding: 0.75rem; background: var(--bg-surface); width: 100%; border-bottom: 1px solid var(--border);">
                <option value="Excellent">Excellent</option>
                <option value="Good" selected>Good</option>
                <option value="Fair">Fair</option>
                <option value="Poor">Poor</option>
            </select>
            <textarea placeholder="Photo details..." class="photo-details" rows="2" style="border-top: none;"></textarea>
        </div>
    </template>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((registration) => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    }, (err) => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
</body>
</html>
